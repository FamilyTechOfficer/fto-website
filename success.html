<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Family Technical Officer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --black: #0A0A0A;
      --white: #F5F0E8;
      --white-dim: #9A948A;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    img { width: 120px; height: auto; margin-bottom: 2rem; }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      margin-bottom: 1rem;
    }
    h1 em { font-style: italic; color: var(--gold); }
    p { color: var(--white-dim); font-size: 1rem; line-height: 1.8; max-width: 44ch; margin-bottom: 2.5rem; }
    a {
      background: var(--gold);
      color: var(--black);
      padding: 0.9rem 2.2rem;
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #E5C97A; }
  </style>
</head>
<body>
  <img src="images/MainLogo.png" alt="FTO" />
  <h1>Message <em>received.</em></h1>
  <p>Thanks for reaching out. I'll be in touch shortly — usually within one business day.</p>
  <a href="/">Back to Home</a>
</body>
</html>
